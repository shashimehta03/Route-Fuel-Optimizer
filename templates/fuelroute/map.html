<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fuel Route Map</title>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    #map { height: 100%; }
    .panel {
      position: absolute; z-index: 1000; top: 12px; left: 12px;
      background: #fff; padding: 12px 16px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2); max-width: 300px; font-size: 14px;
    }
    .panel h3 { margin: 0 0 6px; }
    .err { color: #b00020; }
  </style>
</head>
<body>
  {% if error %}
    <div class="panel err"><strong>Error:</strong> {{ error }}</div>
  {% else %}
    <div class="panel">
      <h3>Fuel-Optimal Route</h3>
      <div>{{ summary.start }} → {{ summary.finish }}</div>
      <div><strong>{{ summary.distance }}</strong> mi ·
           <strong>{{ summary.gallons }}</strong> gal ·
           <strong>${{ summary.cost }}</strong></div>
      <div>{{ summary.stops }} fuel stop(s)</div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    {{ geojson|json_script:"geojson-data" }}
    <script>
      const data = JSON.parse(document.getElementById("geojson-data").textContent);
      const map = L.map("map");
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors", maxZoom: 19,
      }).addTo(map);

      const layer = L.geoJSON(data, {
        style: f => f.properties.kind === "route"
          ? { color: "#1e66f5", weight: 5, opacity: 0.8 } : {},
        pointToLayer: (f, latlng) => L.marker(latlng),
        onEachFeature: (f, l) => {
          const p = f.properties;
          if (p.kind === "fuel_stop") {
            l.bindPopup(
              `<b>Stop ${p.order}: ${p.name}</b><br>${p.city}, ${p.state}` +
              `<br>$${p.price_per_gallon}/gal · ${p.gallons} gal · $${p.cost}` +
              `<br>route mile ${p.route_mile}`);
          }
        },
      }).addTo(map);
      map.fitBounds(layer.getBounds(), { padding: [30, 30] });
    </script>
  {% endif %}
</body>
</html>
